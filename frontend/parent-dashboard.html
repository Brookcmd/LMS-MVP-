<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RollCall | Parent Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto}</style>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="sticky top-0 bg-white p-4 shadow-sm">
    <h1 class="text-lg font-semibold">Parent Dashboard</h1>
  </header>
  <main class="p-4 max-w-2xl mx-auto space-y-4">
    <div id="status" class="text-sm text-gray-600"></div>

    <section class="bg-white p-4 rounded shadow-sm">
      <h2 class="font-semibold">Notifications</h2>
      <div id="notifications" class="mt-3 space-y-2"></div>
    </section>

    <section class="bg-white p-4 rounded shadow-sm">
      <h2 class="font-semibold">Children</h2>
      <div id="children" class="mt-3 space-y-2"></div>
    </section>

    <div class="flex gap-2">
      <a href="parent-attendance.html" class="px-4 py-2 bg-blue-600 text-white rounded">Open Attendance History</a>
      <a href="notifications.html" class="px-4 py-2 border rounded">Open Notifications</a>
    </div>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const notificationsEl = document.getElementById('notifications');
    const childrenEl = document.getElementById('children');

    async function loadNotifications() {
      try {
        const res = await fetch('/parent/notifications', { credentials: 'include' });
        if (res.status === 401) { statusEl.textContent = 'Unauthorized — sign in as parent to see dashboard.'; return; }
        const body = await res.json();
        if (!body.success) throw new Error(body.error?.message||'Failed');
        renderNotifications(body.data.slice(0,5));
      } catch (e) {
        console.error(e);
        statusEl.textContent = 'Error loading notifications';
      }
    }

    function renderNotifications(items) {
      notificationsEl.innerHTML = '';
      if (!items.length) { notificationsEl.innerHTML = '<p class="text-gray-600">No notifications</p>'; return; }
      for (const n of items) {
        const el = document.createElement('div');
        el.className = 'p-2 rounded border';
        el.innerHTML = `<div class="text-sm">${escapeHtml(n.message)}</div><div class="text-xs text-gray-500">${new Date(n.createdAt).toLocaleString()}</div>`;
        notificationsEl.appendChild(el);
      }
    }

    async function loadChildren() {
      // parent-child list is not a dedicated endpoint; derive from notifications or prompt for studentId later
      // We'll show a basic placeholder and link to parent-attendance.html with a studentId query param
      childrenEl.innerHTML = '';
      // try to infer from notifications
      try {
        const res = await fetch('/parent/notifications', { credentials: 'include' });
        if (res.status === 401) return;
        const body = await res.json();
        if (!body.success) return;
        const students = Array.from(new Map(body.data.map(n => [n.student.id, n.student])).values());
        if (!students.length) { childrenEl.innerHTML = '<p class="text-gray-600">No children found</p>'; return; }
        for (const s of students) {
          const node = document.createElement('div');
          node.className = 'flex items-center justify-between';
          node.innerHTML = `<div><div class="font-medium">${escapeHtml(s.name)}</div><div class="text-xs text-gray-500">Class: ${escapeHtml(s.class.name)}</div></div><a class="px-3 py-1 border rounded" href="parent-attendance.html?studentId=${s.id}">History</a>`;
          childrenEl.appendChild(node);
        }
      } catch (e) { console.error(e); }
    }

    function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    loadNotifications();
    loadChildren();
  </script>
</body>
</html>
